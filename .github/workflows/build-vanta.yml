name: Cleanup VANTA CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-vanta.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove temporary releases and PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            [ -n "$tag" ] && gh release delete "$tag" --cleanup-tag --yes || true
          done
          gh pr close 1 --delete-branch || true

      - name: Restore empty repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github ci README.md
          git commit -m "Remove temporary VANTA build files"
          git push origin HEAD:main
