name: Run VANTA v1.3 Category Matrix

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  category:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        category: [case, cpu, motherboard, gpu, cooler, ram, storage, psu, fans, cables]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q playwright pillow numpy trimesh scipy networkx
          python -m playwright install --with-deps chromium > playwright-install-${{ matrix.category }}.log 2>&1
      - name: Build category
        shell: bash
        run: |
          set +e
          bash v13/run_ci_category.sh "${{ matrix.category }}" > build-${{ matrix.category }}.log 2>&1
          code=$?
          tail -n 100 build-${{ matrix.category }}.log
          exit $code
      - name: Upload category diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vanta-log-${{ matrix.category }}
          path: |
            build-${{ matrix.category }}.log
            playwright-install-${{ matrix.category }}.log
          retention-days: 7
          if-no-files-found: warn
      - name: Upload category assets
        uses: actions/upload-artifact@v4
        with:
          name: vanta-category-${{ matrix.category }}
          path: vanta-category-${{ matrix.category }}.zip
          compression-level: 0
          retention-days: 7
          if-no-files-found: error
