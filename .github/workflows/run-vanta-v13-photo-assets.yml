name: Run VANTA v1.3 Photo Asset Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies quietly
        shell: bash
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q playwright pillow numpy trimesh scipy networkx
          python -m playwright install --with-deps chromium > playwright-install.log 2>&1
      - name: Build all verified photo assets
        shell: bash
        run: |
          set +e
          bash v13/run_ci_v2.sh > vanta-build.log 2>&1
          code=$?
          tail -n 120 vanta-build.log
          exit $code
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VANTA-v1.3-build-log
          path: |
            vanta-build.log
            playwright-install.log
          retention-days: 7
          if-no-files-found: warn
      - name: Upload VANTA patch
        uses: actions/upload-artifact@v4
        with:
          name: VANTA-v1.3-Verified-Photo-Assets
          path: |
            VANTA-v1.3-Verified-Photo-Assets.zip
            VANTA-v1.3-Verified-Photo-Assets.zip.sha256
            workspace/reports/QA_VANTA_V13.json
            workspace/reports/QA_VANTA_V13.txt
          compression-level: 0
          retention-days: 7
          if-no-files-found: error
